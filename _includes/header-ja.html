<header class="site-header">
  <div class="header-inner">
    <div class="site-title">Applications</div>
    <button class="hamburger-btn" aria-label="ナビゲーションを開く" aria-expanded="false" onclick="toggleNav(this)">☰</button>
    <nav class="site-nav" id="site-nav">
      <a href="/ja/index.html">ホーム</a>
      <a href="/ja/apps/">アプリ一覧</a>
      <a href="/ja/articles/">技術記事</a>
      <a href="/ja/about.html">概要</a>
      <a href="/ja/privacy.html">プライバシーポリシー</a>
      <a href="/ja/contact.html">お問い合わせ</a>
      <button onclick="switchLanguage()" class="lang-btn">🌐 English</button>
    </nav>
  </div>
</header>

<script>
function toggleNav(btn) {
  var nav = document.getElementById('site-nav');
  var open = nav.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
  btn.textContent = open ? '✕' : '☰';
}
</script>
