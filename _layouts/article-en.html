<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} - Articles</title>
  {% include head.html %}
  <meta name="description" content="{{ page.excerpt }}">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7740689107675714"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

{% include header-en.html %}

<main>
  <section class="hero">
    <p class="article-meta">{{ page.date | date: "%Y-%m-%d" }} · {{ page.category }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.excerpt }}</p>
  </section>

  <article class="content-section">
    {{ content }}
  </article>
</main>

{% include footer-en.html %}

</body>
</html>
