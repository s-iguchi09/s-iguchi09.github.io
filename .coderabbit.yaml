# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit 設定ファイル
# 参考: https://docs.coderabbit.ai/reference/configuration

# レビュー指摘を日本語で行う
language: ja

reviews:
  # より踏み込んだレビュー。低確信の指摘も含めて幅広く拾う
  # (Copilot を外した分の構文・正確性カバレッジを補うため assertive にする)
  profile: assertive

  # 記事(_articles_ja / _articles_en)を対象に、コード・構文・記述の正確性を厳密に検証させる指示
  path_instructions:
    - path: "{_articles_en,_articles_ja}/**"
      instructions: |
        技術的な正確性を最優先で検証すること。対象は記事(_articles_ja / _articles_en)とする。
        - コードサンプル(XAML・C#・シェル・YAML 等)は、実際にコンパイル/パース/実行できるかを厳密に確認する。
          動かない・構文エラーになる例は必ず指摘する。
        - XAML など**マークアップのエスケープ規則・パーサー規則**を必ず確認する。
          例: `{Binding ...}` のショートハンド構文では、書式が `{` で始まる場合の `{}` エスケープ、
          カンマ・空白などの区切り文字を引用符で保護する必要性など、構文規則レベルの誤りを見逃さない。
        - API の挙動・既定値・**機能が導入されたバージョン**などの事実主張を、公式ドキュメントと照合して検証する。
        - 記述が誤解を招く場合(条件の取り違え、原因と結果の混同など)は、正確な条件へ修正するよう指摘する。
        - 指摘は件数を絞らず、見つけたものをすべて 1 回のレビューで挙げる。
          複数回のレビューに分割して小出しにせず、初回レビューの時点で全件を指摘すること。

  # markdownlint による Markdown 検査を有効化(リポジトリの .markdownlint.json を尊重)
  tools:
    markdownlint:
      enabled: true

  auto_review:
    # インクリメンタルレビューを無効化し、指摘を 1 回のレビューにまとめる
    # (push のたびに自動再レビューはされなくなるため、再レビューは明示的に依頼する)
    auto_incremental_review: false
